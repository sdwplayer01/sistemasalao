<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salão Premium — Sistema de Gestão</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!-- Lucide Icons (v2.3) — ícones vetoriais leves -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- ── TELA DE LOGIN ───────────────────────────────── -->
  <div id="page-login" style="display:none"></div>

  <!-- ── APP SHELL (só aparece após login) ───────────── -->
  <div id="app-shell" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <button class="btn-menu" id="btnMenu" style="background:none;border:none;color:var(--txt-white);font-size:24px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center"><i data-lucide="menu"></i></button>
        <div class="brand-text">
          <span class="brand-name" id="sidebarNomeSalao">Salão Premium</span>
          <span class="brand-sub">Gestão Inteligente</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item" data-page="dashboard">
          <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>
          <span class="menu-text">Dashboard</span>
        </button>
        <button class="nav-item" data-page="agenda">
          <span class="nav-icon"><i data-lucide="calendar-check"></i></span>
          <span class="menu-text">Agenda</span>
        </button>
        <button class="nav-item" data-page="diario">
          <span class="nav-icon"><i data-lucide="notebook-pen"></i></span>
          <span class="menu-text">Diário / Caixa</span>
        </button>
        <button class="nav-item" data-page="servicos">
          <span class="nav-icon"><i data-lucide="scissors"></i></span>
          <span class="menu-text">Serviços & Produtos</span>
        </button>
        <button class="nav-item" data-page="custos">
          <span class="nav-icon"><i data-lucide="receipt"></i></span>
          <span class="menu-text">Custos Fixos</span>
        </button>
        <button class="nav-item" data-page="receitas">
          <span class="nav-icon"><i data-lucide="trending-up"></i></span>
          <span class="menu-text">Receitas do Espaço</span>
        </button>
        <button class="nav-item" data-page="controle">
          <span class="nav-icon"><i data-lucide="bar-chart-2"></i></span>
          <span class="menu-text">Controle Anual</span>
        </button>
        <button class="nav-item" data-page="clientes">
          <span class="nav-icon"><i data-lucide="users"></i></span>
          <span class="menu-text">Clientes</span>
        </button>
        <button class="nav-item" data-page="configuracoes">
          <span class="nav-icon"><i data-lucide="settings"></i></span>
          <span class="menu-text">Configurações</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div style="padding-top:4px">
          <div id="userEmail" style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
          <button id="btnLogout" style="width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:7px;border-radius:6px;font-size:12px;cursor:pointer">
            ↩ Sair
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <div class="top-bar">
        <button class="btn-menu-mobile" id="btnMenuMobile" style="background:none;border:none;color:var(--plum-light);font-size:24px;cursor:pointer;display:none;padding:0"><i data-lucide="menu"></i></button>
        <div class="top-bar-title" id="topBarTitle">Dashboard</div>
        <div class="top-bar-right">
          <span class="badge-mes" id="badgeMes"></span>
        </div>
      </div>

      <div id="page-dashboard"    class="page active"></div>
      <div id="page-agenda"       class="page"></div>
      <div id="page-diario"       class="page"></div>
      <div id="page-servicos"     class="page"></div>
      <div id="page-custos"       class="page"></div>
      <div id="page-receitas"     class="page"></div>
      <div id="page-controle"     class="page"></div>
      <div id="page-clientes"     class="page"></div>
      <div id="page-configuracoes" class="page"></div>
    </main>

  </div><!-- /app-shell -->

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Título</h3>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body"   id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
