<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salão Premium — Sistema de Gestão</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── SIDEBAR ─────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">✦</span>
      <div class="brand-text">
        <span class="brand-name" id="sidebarNomeSalao">Salão Premium</span>
        <span class="brand-sub">Gestão Inteligente</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="dashboard">
        <span class="nav-icon">◈</span> Dashboard
      </button>
      <button class="nav-item" data-page="diario">
        <span class="nav-icon">📅</span> Diário
      </button>
      <button class="nav-item" data-page="servicos">
        <span class="nav-icon">✂</span> Serviços
      </button>
      <button class="nav-item" data-page="custos">
        <span class="nav-icon">🏠</span> Custos Fixos
      </button>
      <button class="nav-item" data-page="receitas">
        <span class="nav-icon">💚</span> Receitas Internas
      </button>
      <button class="nav-item" data-page="controle">
        <span class="nav-icon">📊</span> Controle Anual
      </button>
      <button class="nav-item" data-page="configuracoes">
        <span class="nav-icon">⚙</span> Configurações
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-export" id="btnExport" title="Exportar dados">
        ↓ Exportar JSON
      </button>
      <button class="btn-import" id="btnImport" title="Importar dados">
        ↑ Importar JSON
      </button>
      <input type="file" id="fileImport" accept=".json" style="display:none" />
    </div>
  </aside>

  <!-- ── MAIN ────────────────────────────────────── -->
  <main class="main-content">
    <div class="top-bar">
      <button class="btn-menu" id="btnMenu">☰</button>
      <div class="top-bar-title" id="topBarTitle">Dashboard</div>
      <div class="top-bar-right">
        <span class="badge-mes" id="badgeMes"></span>
      </div>
    </div>

    <!-- Pages -->
    <div id="page-dashboard"   class="page active"></div>
    <div id="page-diario"      class="page"></div>
    <div id="page-servicos"    class="page"></div>
    <div id="page-custos"      class="page"></div>
    <div id="page-receitas"    class="page"></div>
    <div id="page-controle"    class="page"></div>
    <div id="page-configuracoes" class="page"></div>
  </main>

  <!-- ── MODAL GENÉRICO ──────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Título</h3>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- ── TOAST ───────────────────────────────────── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ── SCRIPTS ─────────────────────────────────── -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
